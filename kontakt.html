  <style>
    .contact-section {
      padding: clamp(60px, 8vw, 120px) 0;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(32px, 5vw, 64px);
      align-items: start;
    }
    .contact-info h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .contact-info p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 2rem;
    }
    .contact-detail {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: .6rem .75rem;
      border-radius: 8px;
      transition: transform .3s var(--ease), background .3s ease;
    }
    .contact-detail:hover {
      transform: translateX(5px);
      background: rgba(255,255,255,.03);
    }
    .contact-detail-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .3s ease, border-color .3s ease, transform .3s ease;
    }
    .contact-detail:hover .contact-detail-icon {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.2);
      transform: scale(1.08);
    }
    .contact-detail-icon svg {
      width: 18px;
      height: 18px;
      fill: #4cc9f0;
    }
    .contact-detail-text {
      font-size: .92rem;
      color: var(--text-light);
    }
    .contact-detail-text a {
      color: #4cc9f0;
      transition: color .3s;
    }
    .contact-detail-text a:hover { color: #fff; }

    .contact-social {
      display: flex;
      gap: 12px;
      margin-top: 2rem;
    }
    .contact-social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--text-muted);
      transition: all .3s var(--ease);
    }
    .contact-social a:hover {
      background: rgba(255,255,255,.12);
      color: #fff;
      border-color: rgba(255,255,255,.25);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,.3);
    }
    .contact-social a svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .contact-form-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      padding: clamp(28px, 4vw, 48px);
      border-radius: 16px;
      transition: border-color .4s ease, box-shadow .4s ease;
    }
    .contact-form-wrap:hover {
      border-color: rgba(255,255,255,.1);
      box-shadow: 0 12px 48px rgba(0,0,0,.3);
    }
    .contact-form-wrap h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.15);
      color: var(--text);
      font-family: var(--font-body);
      font-size: .9rem;
      border-radius: 8px;
      transition: border-color .3s, box-shadow .3s, background .3s;
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: #4cc9f0;
      box-shadow: 0 0 0 3px rgba(76,201,240,.1);
      background: rgba(255,255,255,.09);
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: var(--text-muted);
      opacity: .6;
    }
    .contact-form textarea {
      resize: vertical;
      min-height: 100px;
    }
    .contact-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .contact-consent {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: .78rem;
      color: var(--text-muted);
      line-height: 1.4;
      cursor: pointer;
    }
    .contact-consent input {
      width: auto !important;
      margin-top: 2px;
      accent-color: #4cc9f0;
    }
    .contact-form-note {
      font-size: .75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── File upload zone ── */
    .file-upload-zone {
      position: relative;
      border: 2px dashed rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .3s ease, background .3s ease, box-shadow .3s ease;
      background: rgba(255,255,255,.02);
    }
    .file-upload-zone:hover,
    .file-upload-zone.dragover {
      border-color: #4cc9f0;
      background: rgba(76,201,240,.04);
      box-shadow: 0 0 0 4px rgba(76,201,240,.06);
    }
    .file-upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .file-upload-icon {
      margin-bottom: 10px;
    }
    .file-upload-icon svg {
      width: 40px;
      height: 40px;
      fill: rgba(255,255,255,.25);
      transition: fill .3s ease;
    }
    .file-upload-zone:hover .file-upload-icon svg,
    .file-upload-zone.dragover .file-upload-icon svg {
      fill: #4cc9f0;
    }
    .file-upload-label {
      font-size: .9rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .file-upload-label strong {
      color: #4cc9f0;
      cursor: pointer;
    }
    .file-upload-hint {
      font-size: .72rem;
      color: var(--text-muted);
      opacity: .6;
      margin-top: 6px;
    }

    /* ── File previews ── */
    .file-preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .file-preview-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      max-width: 100%;
      animation: fileSlideIn .3s ease;
    }
    @keyframes fileSlideIn {
      from { opacity: 0; transform: translateY(8px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .file-preview-thumb {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .file-preview-icon {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: rgba(76,201,240,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .file-preview-icon svg {
      width: 20px;
      height: 20px;
      fill: #4cc9f0;
    }
    .file-preview-info {
      min-width: 0;
    }
    .file-preview-name {
      font-size: .8rem;
      color: var(--text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      display: block;
    }
    .file-preview-size {
      font-size: .7rem;
      color: var(--text-muted);
      opacity: .7;
    }
    .file-preview-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ef4444;
      border: 2px solid #000;
      color: #fff;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
      line-height: 1;
      padding: 0;
    }
    .file-preview-remove:hover {
      transform: scale(1.15);
      background: #dc2626;
    }
    .file-upload-error {
      font-size: .75rem;
      color: #ef4444;
      margin-top: 6px;
      display: none;
    }
    .file-upload-error.show {
      display: block;
      animation: fileSlideIn .3s ease;
    }

    /* ── reCAPTCHA ── */
    .recaptcha-wrap {
      display: flex;
      justify-content: center;
      margin: 4px 0;
    }
    .recaptcha-wrap .g-recaptcha {
      transform-origin: center;
    }
    .recaptcha-error {
      font-size: .75rem;
      color: #ef4444;
      text-align: center;
      margin-top: 4px;
      display: none;
    }
    .recaptcha-error.show {
      display: block;
    }

    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
      .contact-form-row { grid-template-columns: 1fr; }
      .recaptcha-wrap .g-recaptcha {
        transform: scale(.84);
        transform-origin: center;
      }
    }
  </style>
</head>
